# =====================================================================
# ITS WEB Performance Framework - Azure DevOps Pipeline
# Installs JMeter, runs Web Smoke (gate) + selected load profile,
# publishes JTL + HTML dashboard.
# =====================================================================
trigger: none
parameters:
  - name: environment
    type: string
    default: qa
    values: [dev, qa, uat, perf]
  - name: testType
    type: string
    default: Load
    values: [Load, Stress, Spike, Soak]
  - name: users
    type: string
    default: '20'
  - name: rampup
    type: string
    default: '60'
  - name: duration
    type: string
    default: '300'
  - name: syncGroup
    type: string
    default: '1'

variables:
  JMETER_VERSION: '5.6.3'
  JMETER_HOME: '$(Pipeline.Workspace)/apache-jmeter-$(JMETER_VERSION)'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: WebPerformance
    jobs:
      - job: RunJMeter
        timeoutInMinutes: 120
        steps:
          - checkout: self
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'
          - bash: |
              set -e
              cd "$(Pipeline.Workspace)"
              curl -sSL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-$(JMETER_VERSION).tgz" -o jmeter.tgz
              tar -xzf jmeter.tgz
            displayName: 'Install Apache JMeter'
          - bash: |
              chmod +x scripts/run-test.sh
              ./scripts/run-test.sh SmokeTest ${{ parameters.environment }}
            displayName: 'Web Smoke (Quality Gate)'
          - bash: |
              ./scripts/run-test.sh ${{ parameters.testType }}Test ${{ parameters.environment }} \
                -Jusers=${{ parameters.users }} -Jrampup=${{ parameters.rampup }} \
                -Jduration=${{ parameters.duration }} -Jsync_group_size=${{ parameters.syncGroup }}
            displayName: 'Web Load Profile - ${{ parameters.testType }}'
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs: { targetPath: 'results', artifact: 'jtl-results' }
            displayName: 'Publish JTL'
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs: { targetPath: 'reports', artifact: 'html-dashboard' }
            displayName: 'Publish HTML dashboard'
