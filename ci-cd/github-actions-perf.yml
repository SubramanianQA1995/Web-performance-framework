# =====================================================================
# ITS WEB Performance Framework - GitHub Actions
# Place at: .github/workflows/web-perf-tests.yml
# =====================================================================
name: ITS Web Performance Tests
on:
  workflow_dispatch:
    inputs:
      environment: { description: 'Environment', type: choice, options: [dev, qa, uat, perf], default: qa }
      testType:    { description: 'Load profile', type: choice, options: [Load, Stress, Spike, Soak], default: Load }
      users:       { description: 'Virtual users', default: '20' }
      rampup:      { description: 'Ramp-up seconds', default: '60' }
      duration:    { description: 'Steady-state seconds', default: '300' }
      syncGroup:   { description: 'Competitive burst group size (seat); 1=off', default: '1' }
  schedule:
    - cron: '0 3 * * 1'        # Monday 03:00 UTC web smoke+load

env:
  JMETER_VERSION: 5.6.3

jobs:
  web-performance:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - name: Install Apache JMeter
        run: |
          set -e
          curl -sSL "https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${JMETER_VERSION}.tgz" -o jmeter.tgz
          tar -xzf jmeter.tgz
          echo "JMETER_HOME=$PWD/apache-jmeter-${JMETER_VERSION}" >> "$GITHUB_ENV"
      - name: Web Smoke (Quality Gate)
        run: |
          chmod +x scripts/run-test.sh
          ./scripts/run-test.sh SmokeTest "${{ github.event.inputs.environment || 'qa' }}"
      - name: Web Load Profile
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          ./scripts/run-test.sh "${{ github.event.inputs.testType }}Test" "${{ github.event.inputs.environment }}" \
            -Jusers=${{ github.event.inputs.users }} -Jrampup=${{ github.event.inputs.rampup }} \
            -Jduration=${{ github.event.inputs.duration }} -Jsync_group_size=${{ github.event.inputs.syncGroup }}
      - name: Upload JTL
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: jtl-results, path: results/** }
      - name: Upload HTML dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: html-dashboard, path: reports/** }
