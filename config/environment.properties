# =====================================================================
# ITS WEB Performance Framework - DEFAULT / ACTIVE environment
# ---------------------------------------------------------------------
# Application-level (browser-simulation) load testing.
# All ITS pages later replace ONLY these values - no JMX change needed.
# =====================================================================

# ---- Target web app (SUT) -------------------------------------------
env=QA
protocol=https
base_url=blazedemo.com
port=443

# ---- Browser realism ------------------------------------------------
# Only download embedded resources (css/js/img) from the app domain,
# not 3rd-party CDNs (keeps the measurement about YOUR frontend).
embedded_url_re=^https?://(www\\.)?blazedemo\\.com/.*

# ---- Load profile (overridden per scenario / per env) ---------------
users=20
rampup=60
duration=300
loops=-1
startup_delay=0

# ---- Think time between pages (real users read/scan) ----------------
think_time_min=2000
think_time_max=6000
think_time_range=4000

# ---- Competitive burst (Synchronizing Timer on seat selection) ------
# sync_group_size=1 -> OFF (each user proceeds immediately).
# Set to the cohort size (e.g. 1000) to make N users hit seat
# selection at the SAME instant (flash on-sale). Keep <= total threads.
# sync_timeout releases the group anyway if it does not fill in time
# (prevents hangs during ramp-up).
sync_group_size=1
sync_timeout=20000

# ---- Connection timeouts (ms) ---------------------------------------
connect_timeout=10000
response_timeout=60000

# ---- Page SLA thresholds (ms) - full page incl. embedded resources --
sla_landing_ms=4000
sla_reserve_ms=4000
sla_purchase_ms=4000
sla_confirm_ms=5000

# ---- Test data files (filename only -> BlazeMeter/RedLine13 safe) ---
routes_file=routes.csv
userdata_file=userdata.csv
