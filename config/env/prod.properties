# ---- PROD overrides (OPTIONAL - read-only smoke unless signed off) ---
env=PROD
protocol=https
base_url=blazedemo.com
port=443
embedded_url_re=^https?://(www\\.)?blazedemo\\.com/.*
routes_file=routes.csv
userdata_file=userdata.csv
