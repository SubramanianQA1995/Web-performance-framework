# ---- PERF environment overrides (production-like; drive via cloud) --
env=PERF
protocol=https
base_url=blazedemo.com
port=443
embedded_url_re=^https?://(www\\.)?blazedemo\\.com/.*
routes_file=routes.csv
userdata_file=userdata.csv
# Real promo-scale numbers come from distributed BlazeMeter/RedLine13
# generators - do NOT run thousands of browser-weight threads on one host.
users=500
rampup=300
duration=3600
think_time_min=3000
think_time_range=7000
# Competitive on-sale: make the whole cohort hit seat selection together.
sync_group_size=500
sync_timeout=60000
# base_url=its-perf.company.com
